<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الغرفة - الأدمن</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #0f0f1a;
            color: #00ffcc;
            padding-top: 100px;
            margin: 0;
        }
        .dashboard {
            border: 2px solid #00ffcc;
            background: rgba(0, 255, 204, 0.03);
            padding: 40px;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 { font-size: 32px; color: #fff; margin-bottom: 5px; }
        .status { color: #00ffcc; font-size: 18px; font-weight: bold; margin-bottom: 25px; }
        .room-box {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 20px;
            color: #ff007f;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>شاشة التحكم والأدمن 👑</h1>
        <p class="status">● النظام يعمل ومتصل بنجاح</p>
        
        <div class="room-box" id="roomDisplay">
            جاري التعرف على الغرفة...
        </div>
    </div>

    <script>
        // كود ذكي بيقرأ كود الأوضة اللي مبعوت من صفحة الـ index وبيظهره في الشاشة
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        
        if(room) {
            document.getElementById('roomDisplay').innerText = "أنت الآن تتحكم في غرفة رقم: " + room;
        } else {
            document.getElementById('roomDisplay').innerText = "خطأ: لم يتم تحديد غرفة بشكل صحيح!";
            document.getElementById('roomDisplay').style.color = "red";
        }
    </script>

</body>
</html>
